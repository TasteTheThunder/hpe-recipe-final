replicaCount: 1

image:
  repository: hpe-recipe-detection
  tag: "0.0.1"
  pullPolicy: Never

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}

recipeData:
  chartVersion: "0.0.1"
  catalog_name: "HPE Analytics Runtime"
  catalog_description: "Enterprise analytics and streaming platform catalog"
  release_date: "2026-05-20"
  catalog_status: "GA"
  maintainer: "HPE DevOps Team"
  recipes:
    - version: "1.3.0"
      description: "Base recipe with core analytics components"
      release_date: "2026-05-20"
      status: "GA"
      release_notes: "Initial enterprise recipe baseline for analytics"
      components:
        spark:
          version: "3.1.2"
          release_date: "2026-05-18"
          upgrade_from: []
          upgrade_to:
            - "3.2.0"
        kafka:
          version: "3.1.0"
          release_date: "2026-05-17"
          upgrade_from: []
          upgrade_to:
            - "3.2.1"
        airflow:
          version: "2.3.0"
          release_date: "2026-05-15"
          upgrade_from: []
          upgrade_to:
            - "2.4.1"
        hbase:
          version: "2.4.6"
          release_date: "2026-05-16"
          upgrade_from: []
          upgrade_to:
            - "2.4.8"
      upgrade_to:
        - "1.3.1"
    - version: "1.3.1"
      description: "Patch release with minor component upgrades"
      release_date: "2026-05-21"
      status: "GA"
      release_notes: "Improved Kafka scalability and Spark optimization"
      components:
        spark:
          version: "3.2.0"
          release_date: "2026-05-21"
          upgrade_from:
            - "3.1.2"
          upgrade_to:
            - "3.3.0"
        kafka:
          version: "3.2.1"
          release_date: "2026-05-20"
          upgrade_from:
            - "3.1.0"
          upgrade_to:
            - "3.3.0"
        airflow:
          version: "2.4.1"
          release_date: "2026-05-19"
          upgrade_from:
            - "2.3.0"
          upgrade_to:
            - "2.5.0"
        hbase:
          version: "2.4.8"
          release_date: "2026-05-19"
          upgrade_from:
            - "2.4.6"
          upgrade_to:
            - "2.4.9"
